    function procesarDatos() {
        const categoriasSet = new Set();
        const productosSet = new Set();
        const proveedoresSet = new Set();
        const anosSet = new Set();
        let gastoTotal = 0;
        for (let c of appData.compras) {
            categoriasSet.add(c.Categoria);
            productosSet.add(c.Producto);
            proveedoresSet.add(c.Proveedor);
            anosSet.add(c.Año);
            gastoTotal += c.CostoTotal;
        }
        appData.categorias = Array.from(categoriasSet).sort();
        appData.productos = Array.from(productosSet).sort();
        appData.proveedores = Array.from(proveedoresSet).sort();
        appData.anos = Array.from(anosSet).sort();
        appData.gastoTotal = gastoTotal;
        appData.datosCargados = true;
    }

    function mostrarMensaje(msg, tipo) {

            setTimeout(() => div.innerHTML = "", 4000);
        }
    }

    function leerExcelAbastecimiento(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            if (rows.length < 2) {
                mostrarMensaje("❌ El archivo está vacío.", "error");
                return;
            }
            const headerRow = rows[0];
            const idxAño = headerRow.findIndex(c => String(c).toLowerCase().includes("año") || String(c).toLowerCase().includes("ano"));
            const idxProducto = headerRow.findIndex(c => String(c).toLowerCase().includes("producto"));
            const idxCategoria = headerRow.findIndex(c => String(c).toLowerCase().includes("categoría") || String(c).toLowerCase().includes("categoria"));
            const idxProveedor = headerRow.findIndex(c => String(c).toLowerCase().includes("proveedor"));
            const idxCantidad = headerRow.findIndex(c => String(c).toLowerCase().includes("cantidad comprada") || String(c).toLowerCase().includes("cantidad"));
            const idxUnidad = headerRow.findIndex(c => String(c).toLowerCase().includes("unidad"));
            const idxPrecio = headerRow.findIndex(c => String(c).toLowerCase().includes("precio unitario"));
            const idxCostoTotal = headerRow.findIndex(c => String(c).toLowerCase().includes("costo total"));
            const idxImportancia = headerRow.findIndex(c => String(c).toLowerCase().includes("importancia"));
            const idxNProveedores = headerRow.findIndex(c => String(c).toLowerCase().includes("número de proveedores") || String(c).toLowerCase().includes("numero de proveedores"));

            if (idxAño === -1 || idxProducto === -1 || idxCostoTotal === -1) {
                mostrarMensaje("❌ No se encontraron columnas requeridas (Año, Producto, Costo Total).", "error");
                return;
            }

            let compras = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                let año = row[idxAño] ? parseInt(row[idxAño]) : NaN;
                if (isNaN(año)) continue;
                let producto = row[idxProducto] ? String(row[idxProducto]).trim() : "";
                if (producto === "") continue;
                let categoria = idxCategoria !== -1 ? (row[idxCategoria] ? String(row[idxCategoria]).trim() : "") : "";
                let proveedor = idxProveedor !== -1 ? (row[idxProveedor] ? String(row[idxProveedor]).trim() : "") : "";
                let cantidad = idxCantidad !== -1 ? (row[idxCantidad] ? parseFloat(String(row[idxCantidad]).replace(/[^0-9.-]/g, '')) : 0) : 0;
                let unidad = idxUnidad !== -1 ? (row[idxUnidad] ? String(row[idxUnidad]).trim() : "") : "";
                let precio = idxPrecio !== -1 ? (row[idxPrecio] ? parseFloat(String(row[idxPrecio]).replace(/[^0-9.-]/g, '')) : 0) : 0;
                let costoTotal = row[idxCostoTotal] ? parseFloat(String(row[idxCostoTotal]).replace(/[^0-9.-]/g, '')) : 0;
                let importancia = idxImportancia !== -1 ? (row[idxImportancia] ? String(row[idxImportancia]).trim() : "") : "Media";
                let nProveedores = idxNProveedores !== -1 ? (row[idxNProveedores] ? parseInt(row[idxNProveedores]) : 2) : 2;

                compras.push({
                    Año: año, Producto: producto, Categoria: categoria, Proveedor: proveedor,
                    Cantidad: cantidad, Unidad: unidad, Precio: precio, CostoTotal: costoTotal,
                    Importancia: importancia, NProveedores: nProveedores
                });
            }

            if (compras.length === 0) {
                mostrarMensaje("❌ No se encontraron registros de compras.", "error");
                return;
            }
            appData.compras = compras;
            procesarDatos();
            mostrarMensaje(`✅ Archivo cargado: ${compras.length} registros. Gasto total: $${appData.gastoTotal.toFixed(2)}`, "success");
            renderStep(currentStep);
        };
        reader.readAsArrayBuffer(file);
    }

    function calcularHHI() {
        let gastoPorProveedor = {};
        for (let c of appData.compras) {
            gastoPorProveedor[c.Proveedor] = (gastoPorProveedor[c.Proveedor] || 0) + c.CostoTotal;
        }
        let total = Object.values(gastoPorProveedor).reduce((a,b)=>a+b,0);
        let hhi = 0;
        for (let gasto of Object.values(gastoPorProveedor)) {
            let share = gasto / total;
            hhi += share * share;
        }
        return hhi;
    }

    function clasificacionABC_Proveedores() {
        let gastoPorProveedor = {};
        for (let c of appData.compras) {
            gastoPorProveedor[c.Proveedor] = (gastoPorProveedor[c.Proveedor] || 0) + c.CostoTotal;
        }
        let sorted = Object.entries(gastoPorProveedor).sort((a,b) => b[1] - a[1]);
        let total = sorted.reduce((s,item)=>s+item[1],0);
        let acum = 0;
        return sorted.map(([prov, gasto]) => {
            let porc = gasto / total;
            acum += porc;
            let cat = acum <= 0.8 ? "A" : (acum <= 0.95 ? "B" : "C");
            return { Proveedor: prov, Gasto: gasto, Porcentaje: porc, Acumulado: acum, Categoria: cat };
        });
    }

        let gastoPorAño = {};
        for (let c of appData.compras) {
            gastoPorAño[c.Año] = (gastoPorAño[c.Año] || 0) + c.CostoTotal;
        }
        let años = Object.keys(gastoPorAño).map(Number).sort();
        if (años.length < 2) return null;
        let valores = años.map(a => gastoPorAño[a]);
        let n = años.length;
        let sumX = años.reduce((a,b)=>a+b,0);
        let sumY = valores.reduce((a,b)=>a+b,0);
        let sumXY = 0, sumX2 = 0;
        for (let i=0; i<n; i++) {
            sumXY += años[i] * valores[i];
            sumX2 += años[i] * años[i];
        }
        let pendiente = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
        let intercept = (sumY - pendiente*sumX) / n;
        let pronostico2026 = intercept + pendiente * 2026;
        return { pendiente, intercept, pronostico: Math.max(0, pronostico2026) };
    }

    function detectarProblemas() {
        let problemas = [];
        let hhi = calcularHHI();
        if (hhi > 0.25) problemas.push({ proceso: "Concentración de proveedores", descripcion: `Índice HHI = ${hhi.toFixed(3)} (>0.25). Alta dependencia de pocos proveedores.`, severidad: "Alto" });
        let proveedoresPorProducto = {};
        for (let c of appData.compras) {
            if (!proveedoresPorProducto[c.Producto]) proveedoresPorProducto[c.Producto] = new Set();
            proveedoresPorProducto[c.Producto].add(c.Proveedor);
        }
        let productosUnicoProveedor = Object.entries(proveedoresPorProducto).filter(([prod, provSet]) => provSet.size === 1).map(([prod]) => prod);
        if (productosUnicoProveedor.length > 0) {
            problemas.push({ proceso: "Riesgo de suministro", descripcion: `${productosUnicoProveedor.length} producto(s) tienen un solo proveedor: ${productosUnicoProveedor.join(", ")}.`, severidad: "Alto" });
        }
        let preciosPorProductoAño = {};
        for (let c of appData.compras) {
            if (!preciosPorProductoAño[c.Producto]) preciosPorProductoAño[c.Producto] = {};
            preciosPorProductoAño[c.Producto][c.Año] = c.Precio;
        }
        let incrementos = [];
        for (let prod in preciosPorProductoAño) {
            let añosProd = Object.keys(preciosPorProductoAño[prod]).map(Number).sort();
            for (let i=1; i<añosProd.length; i++) {
                let anterior = preciosPorProductoAño[prod][añosProd[i-1]];
                let actual = preciosPorProductoAño[prod][añosProd[i]];
                if (anterior > 0) {
                    let inc = (actual - anterior) / anterior * 100;
                    if (inc > 10) incrementos.push(`${prod}: ${inc.toFixed(1)}% de ${añosProd[i-1]} a ${añosProd[i]}`);
                }
            }
        }
        if (incrementos.length > 0) {
            problemas.push({ proceso: "Inflación de precios", descripcion: `Incrementos >10% detectados: ${incrementos.slice(0,3).join("; ")}${incrementos.length>3?"...":""}`, severidad: "Medio" });
        }
        return problemas;
    }

                setTimeout(() => {

        container.innerHTML = html;
        if(step===1){

                document.querySelectorAll(".step-btn").forEach(b => b.classList.remove("active"));

                renderStep(currentStep);
            });

        renderStep(1);
    }
    init();
</script>
